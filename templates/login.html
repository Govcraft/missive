{% extends "base.html" %}

{% block title %}Login - Missive{% endblock %}

{% block content %}
<div class="flex min-h-full items-center justify-center px-4 py-12 sm:px-6 lg:px-8">
    <div class="w-full max-w-sm space-y-10">
        <div>
            <img src="/static/images/logo.png" alt="Missive" class="mx-auto h-48 w-auto" />
            <h2 class="mt-10 text-center text-2xl/9 font-bold tracking-tight text-brand-900">Sign in to your account</h2>
        </div>

        {% if let Some(err) = error %}
        <div class="rounded-md bg-red-50 px-4 py-3 text-sm text-red-700 ring-1 ring-red-200 ring-inset">
            {{ err }}
        </div>
        {% endif %}

        <form action="/login" method="POST" class="space-y-6">
            <div>
                <div>
                    <input id="username" type="text" name="username" required placeholder="Username" autocomplete="username" aria-label="Username"
                        class="block w-full rounded-t-md bg-white px-3 py-1.5 text-base text-brand-900 outline-1 -outline-offset-1 outline-brand-300 placeholder:text-brand-400 focus:relative focus:outline-2 focus:-outline-offset-2 focus:outline-brand-500 sm:text-sm/6" />
                </div>
                <div class="-mt-px">
                    <input id="password" type="password" name="password" required placeholder="Password" autocomplete="current-password" aria-label="Password"
                        class="block w-full rounded-b-md bg-white px-3 py-1.5 text-base text-brand-900 outline-1 -outline-offset-1 outline-brand-300 placeholder:text-brand-400 focus:relative focus:outline-2 focus:-outline-offset-2 focus:outline-brand-500 sm:text-sm/6" />
                </div>
            </div>

            <div>
                <button type="submit"
                    class="flex w-full justify-center rounded-md bg-brand-700 px-3 py-1.5 text-sm/6 font-semibold text-white shadow-xs hover:bg-brand-600 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-brand-700">
                    Sign in
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
