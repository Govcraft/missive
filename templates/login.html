        </div>

        {% if let Some(err) = error %}
        <div class="rounded-md bg-red-50 px-4 py-3 text-sm text-red-700 ring-1 ring-red-200 ring-inset">
            {{ err }}
        </div>
        {% endif %}

        <form action="/login" method="POST" class="space-y-6">
            <div>
                <div>
                    <input id="username" type="text" name="username" required placeholder="Email address" autocomplete="username" aria-label="Username"
                        class="block w-full rounded-t-md bg-surface px-3 py-1.5 text-base text-on-surface outline-1 -outline-offset-1 outline-border-strong placeholder:text-on-surface-faint focus:relative focus:outline-2 focus:-outline-offset-2 focus:outline-ring sm:text-sm/6" />
                </div>
                <div class="-mt-px">
                    <input id="password" type="password" name="password" required placeholder="Password" autocomplete="current-password" aria-label="Password"
                        class="block w-full rounded-b-md bg-surface px-3 py-1.5 text-base text-on-surface outline-1 -outline-offset-1 outline-border-strong placeholder:text-on-surface-faint focus:relative focus:outline-2 focus:-outline-offset-2 focus:outline-ring sm:text-sm/6" />
                </div>
            </div>

            <div>
                <button type="submit"
                    class="flex w-full justify-center rounded-md bg-primary px-3 py-1.5 text-sm/6 font-semibold text-on-primary shadow-xs hover:bg-primary-hover focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary transition-colors">
                    Sign in
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
