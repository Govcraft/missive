<!DOCTYPE html>
<html lang="en" class="h-full bg-white">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Missive{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@1" type="module"></script>
    <link rel="preconnect" href="https://rsms.me">
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body class="h-full text-gray-900">
    {% block content %}{% endblock %}
<div id="toast-container" aria-live="assertive"
     class="fixed top-4 right-4 z-50 flex w-96 flex-col gap-3"
     hx-get="/api/v1/flash"
     hx-trigger="flashUpdated from:body"
     hx-swap="innerHTML">
</div>
<script>
function resizeEmailIframe(iframe) {
    try {
        iframe.style.height = iframe.contentDocument.documentElement.scrollHeight + 'px';
    } catch(e) {
        iframe.style.height = '600px';
    }
}
document.body.addEventListener('emailRead', function() {
    var row = document.querySelector('.email-row.bg-blue-100');
    if (row) {
        row.classList.remove('bg-white');
        row.classList.add('bg-gray-50/50');
        row.querySelectorAll('.font-semibold').forEach(function(el) {
            el.classList.remove('font-semibold', 'text-gray-900');
            el.classList.add('text-gray-600');
        });
        row.querySelectorAll('.font-medium').forEach(function(el) {
            el.classList.remove('font-medium', 'text-gray-800');
            el.classList.add('text-gray-600');
        });
    }
});
document.body.addEventListener('htmx:afterSwap', function(event) {
    if (event.detail.target.id === 'toast-container') {
        event.detail.target.querySelectorAll('[data-auto-dismiss]').forEach(function(toast) {
            setTimeout(function() { toast.remove(); }, 5000);
        });
    }
    document.querySelectorAll('iframe[srcdoc]').forEach(function(iframe) {
        iframe.onload = function() { resizeEmailIframe(this); };
    });
});
document.addEventListener('keydown', function(e) {
    var tag = e.target.tagName;
    var isInput = (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' || e.target.isContentEditable);
    var composeForm = document.querySelector('#email-detail-pane form[hx-post*="send"], #email-detail-pane form[hx-post*="compose"]');
    var dialog = document.getElementById('shortcuts-dialog');
    var detailPane = document.getElementById('email-detail-pane');

    // Compose mode: Ctrl+Enter to send, Escape to cancel
    if (composeForm) {
        if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
            e.preventDefault();
            var sendBtn = composeForm.querySelector('button[type="submit"]');
            if (sendBtn) sendBtn.click();
            return;
        }
        if (e.key === 'Escape') {
            e.preventDefault();
            var cancelBtn = composeForm.querySelector('a[href="#"], button[hx-get*="empty"], .cancel-compose');
            if (cancelBtn) { cancelBtn.click(); return; }
            if (detailPane) detailPane.replaceChildren();
            return;
        }
    }

    // Don't intercept typing in inputs (after compose-specific handling)
    if (isInput) return;

    var key = e.key;

    // ? — toggle shortcuts modal
    if (key === '?') {
        e.preventDefault();
        if (dialog) {
            if (dialog.open) {
                dialog.close();
            } else {
                dialog.showModal();
            }
        }
        return;
    }

    // Escape — close modal or clear detail pane
    if (key === 'Escape') {
        if (dialog && dialog.open) return; // browser handles closing the dialog
        if (detailPane) detailPane.replaceChildren();
        return;
    }

    // / — focus search
    if (key === '/') {
        e.preventDefault();
        var search = document.getElementById('search-input');
        if (search) search.focus();
        return;
    }

    // c — compose
    if (key === 'c') {
        var composeBtn = document.querySelector('button[hx-get*="compose"]');
        if (composeBtn) composeBtn.click();
        return;
    }

    // x — toggle checkbox on current/highlighted email row
    if (key === 'x') {
        var current = document.querySelector('.email-row.bg-blue-100');
        if (current) {
            var checkbox = current.closest('li').querySelector('.bulk-checkbox');
            if (checkbox) {
                checkbox.checked = !checkbox.checked;
                document.body.dispatchEvent(new Event('bulkSelectionChanged'));
            }
        }
        return;
    }

    // j/k — navigate email list
    if (key === 'j' || key === 'k') {
        var current = document.querySelector('.email-row.bg-blue-100');
        var target;
        if (current) {
            target = key === 'j' ? current.nextElementSibling : current.previousElementSibling;
            while (target && !target.classList.contains('email-row')) {
                target = key === 'j' ? target.nextElementSibling : target.previousElementSibling;
            }
        } else {
            var rows = document.querySelectorAll('.email-row');
            if (rows.length > 0) {
                target = key === 'j' ? rows[0] : rows[rows.length - 1];
            }
        }
        if (target) target.click();
        return;
    }

    // Action shortcuts — only when viewing an email (not composing)
    if (!detailPane) return;
    var hasActions = detailPane.querySelector('[title="Reply"], [title="Reply all"], [title="Forward"]');
    if (!hasActions) return;

    var actionMap = {
        'r': 'Reply',
        'a': 'Reply all',
        'f': 'Forward',
        'e': 'Archive',
        '#': 'Delete',
        'u': 'Mark as unread'
    };
    var actionTitle = actionMap[key];
    if (actionTitle) {
        var btn = detailPane.querySelector('[title="' + actionTitle + '"]');
        if (btn) btn.click();
    }
});
// Bulk selection management
document.body.addEventListener('bulkSelectionChanged', function() {
    var checked = document.querySelectorAll('.bulk-checkbox:checked');
    var bar = document.getElementById('bulk-actions-bar');
    var countEl = document.getElementById('bulk-count');
    var idsInput = document.getElementById('bulk-email-ids');
    var mailboxInput = document.getElementById('bulk-mailbox-id');
    var activeMailbox = document.getElementById('active-mailbox-id');

    if (!bar) return;

    if (checked.length > 0) {
        bar.classList.remove('hidden');
        countEl.textContent = checked.length + ' selected';
        var ids = Array.from(checked).map(function(cb) { return cb.value; }).join(',');
        idsInput.value = ids;
        if (activeMailbox) mailboxInput.value = activeMailbox.value;
    } else {
        bar.classList.add('hidden');
    }
});

// Clear bulk selection when email list is refreshed
document.body.addEventListener('htmx:afterSwap', function(event) {
    if (event.detail.target.id === 'email-list-pane') {
        var bar = document.getElementById('bulk-actions-bar');
        if (bar) bar.classList.add('hidden');
    }
});
</script>
</body>
</html>
