<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Postal{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body class="bg-gray-100 text-gray-900 h-screen overflow-hidden">
    {% block content %}{% endblock %}
<script>
function resizeEmailIframe(iframe) {
    try {
        iframe.style.height = iframe.contentDocument.documentElement.scrollHeight + 'px';
    } catch(e) {
        iframe.style.height = '600px';
    }
}
document.body.addEventListener('htmx:afterSwap', function() {
    document.querySelectorAll('iframe[srcdoc]').forEach(function(iframe) {
        iframe.onload = function() { resizeEmailIframe(this); };
    });
});
</script>
</body>
</html>
