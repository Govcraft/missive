<!DOCTYPE html>
<html lang="en" class="h-full bg-white">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Missive{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@1" type="module"></script>
    <link rel="preconnect" href="https://rsms.me">
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body class="h-full text-gray-900">
    {% block content %}{% endblock %}
<div id="toast-container" aria-live="assertive"
     class="fixed top-4 right-4 z-50 flex w-96 flex-col gap-3"
     hx-get="/api/v1/flash"
     hx-trigger="flashUpdated from:body"
     hx-swap="innerHTML">
</div>
<script>
function resizeEmailIframe(iframe) {
    try {
        iframe.style.height = iframe.contentDocument.documentElement.scrollHeight + 'px';
    } catch(e) {
        iframe.style.height = '600px';
    }
}
document.body.addEventListener('emailRead', function() {
    var row = document.querySelector('.email-row.bg-blue-100');
    if (row) {
        row.classList.remove('bg-white');
        row.classList.add('bg-gray-50/50');
        row.querySelectorAll('.font-semibold').forEach(function(el) {
            el.classList.remove('font-semibold', 'text-gray-900');
            el.classList.add('text-gray-600');
        });
        row.querySelectorAll('.font-medium').forEach(function(el) {
            el.classList.remove('font-medium', 'text-gray-800');
            el.classList.add('text-gray-600');
        });
    }
});
document.body.addEventListener('htmx:afterSwap', function(event) {
    if (event.detail.target.id === 'toast-container') {
        event.detail.target.querySelectorAll('[data-auto-dismiss]').forEach(function(toast) {
            setTimeout(function() { toast.remove(); }, 5000);
        });
    }
    document.querySelectorAll('iframe[srcdoc]').forEach(function(iframe) {
        iframe.onload = function() { resizeEmailIframe(this); };
    });
});
</script>
</body>
</html>
