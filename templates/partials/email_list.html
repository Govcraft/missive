{% if emails.is_empty() %}
<div class="flex items-center justify-center h-full text-sm text-gray-400">
    No emails in this mailbox
</div>
{% else %}
<div class="divide-y divide-gray-100">
    {% for email in emails %}
    <a href="#"
       hx-get="/api/v1/emails/{{ email.id }}"
       hx-target="#email-detail-pane"
       hx-swap="innerHTML"
       class="email-row block px-4 py-3 hover:bg-blue-50 cursor-pointer transition-colors{% if email.is_unread %} bg-white{% else %} bg-gray-50{% endif %}"
       onclick="document.querySelectorAll('.email-row').forEach(el => el.classList.remove('bg-blue-100')); this.classList.add('bg-blue-100');">
        <div class="flex items-baseline justify-between mb-1">
            <span class="text-sm truncate max-w-[200px]{% if email.is_unread %} font-semibold text-gray-900{% else %} text-gray-600{% endif %}">
                {{ email.from }}
            </span>
            <span class="text-xs text-gray-400 ml-2 whitespace-nowrap">
                {{ email.received_at }}
            </span>
        </div>
        <div class="text-sm truncate{% if email.is_unread %} font-medium text-gray-800{% else %} text-gray-600{% endif %}">
            {{ email.subject }}
        </div>
        <div class="text-xs text-gray-400 truncate mt-0.5">
            {{ email.preview }}
        </div>
    </a>
    {% endfor %}
</div>
{% endif %}
