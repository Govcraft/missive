<ul role="list">
    {% for mailbox in mailboxes %}
    <li>
        <a href="#"
           hx-get="/api/v1/emails?mailbox_id={{ mailbox.id }}"
           hx-target="#email-list-pane"
           hx-swap="innerHTML"
           class="mailbox-item flex items-center justify-between px-4 py-1.5 text-sm hover:bg-surface-raised cursor-pointer transition-colors sm:px-6{% if mailbox.role == "inbox" %} bg-surface-raised text-on-surface-secondary{% endif %}"
           {% if mailbox.role == "inbox" %}hx-trigger="load, click" {% endif %}onclick="document.querySelectorAll('.mailbox-item').forEach(el => el.classList.remove('bg-surface-raised', 'text-on-surface-secondary')); this.classList.add('bg-surface-raised', 'text-on-surface-secondary'); document.getElementById('active-mailbox-id').value = '{{ mailbox.id }}'; document.getElementById('search-input').value = ''; var grid = document.querySelector('.missive-grid'); if (grid) grid.dataset.activePane = 'emails';">
            <span class="truncate{% if mailbox.role == "inbox" %} font-semibold{% endif %}">
                {{ mailbox.name }}
            </span>
            {% if mailbox.unread_count > 0 %}
            <span class="ml-2 inline-flex items-center rounded-full bg-accent-surface px-1.5 py-0.5 text-xs font-medium text-accent inset-ring inset-ring-accent/20">
                {{ mailbox.unread_count }}
            </span>
            {% endif %}
        </a>
    </li>
    {% endfor %}
</ul>
{% for mailbox in mailboxes %}
{% if mailbox.role == "inbox" %}
<script>document.getElementById('active-mailbox-id').value = '{{ mailbox.id }}';</script>
{% endif %}
{% endfor %}
