<div id="bulk-actions-bar" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 z-40 flex items-center gap-3 rounded-lg bg-brand-950 px-4 py-3 shadow-xl">
    <span id="bulk-count" class="text-sm text-white">0 selected</span>
    <form class="inline-flex">
        <input type="hidden" name="mailbox_id" id="bulk-mailbox-id" value="" />
        <input type="hidden" name="email_ids" id="bulk-email-ids" value="" />

        <span class="isolate inline-flex rounded-md shadow-xs">
            <button type="submit" formaction="javascript:void(0)"
                    class="relative inline-flex items-center rounded-l-md bg-brand-800 px-3 py-2 text-xs font-medium text-white inset-ring-1 inset-ring-brand-700 hover:bg-brand-700 focus:z-10"
                    hx-post="/api/v1/emails/bulk"
                    hx-target="#email-detail-pane"
                    hx-swap="innerHTML"
                    hx-include="#bulk-email-ids, #bulk-mailbox-id"
                    hx-vals='{"action": "delete"}'
                    hx-confirm="Delete selected emails?">
                Delete
            </button>
            <button type="submit" formaction="javascript:void(0)"
                    class="relative -ml-px inline-flex items-center bg-brand-800 px-3 py-2 text-xs font-medium text-white inset-ring-1 inset-ring-brand-700 hover:bg-brand-700 focus:z-10"
                    hx-post="/api/v1/emails/bulk"
                    hx-target="#email-detail-pane"
                    hx-swap="innerHTML"
                    hx-include="#bulk-email-ids, #bulk-mailbox-id"
                    hx-vals='{"action": "archive"}'>
                Archive
            </button>
            <button type="submit" formaction="javascript:void(0)"
                    class="relative -ml-px inline-flex items-center rounded-r-md bg-brand-800 px-3 py-2 text-xs font-medium text-white inset-ring-1 inset-ring-brand-700 hover:bg-brand-700 focus:z-10"
                    hx-post="/api/v1/emails/bulk"
                    hx-target="#email-detail-pane"
                    hx-swap="innerHTML"
                    hx-include="#bulk-email-ids, #bulk-mailbox-id"
                    hx-vals='{"action": "spam"}'>
                Spam
            </button>
        </span>

        <span class="isolate inline-flex rounded-md shadow-xs ml-2">
            <button type="submit" formaction="javascript:void(0)"
                    class="relative inline-flex items-center rounded-l-md bg-brand-800 px-3 py-2 text-xs font-medium text-white inset-ring-1 inset-ring-brand-700 hover:bg-brand-700 focus:z-10"
                    hx-post="/api/v1/emails/bulk"
                    hx-target="#email-detail-pane"
                    hx-swap="innerHTML"
                    hx-include="#bulk-email-ids, #bulk-mailbox-id"
                    hx-vals='{"action": "read"}'>
                Mark read
            </button>
            <button type="submit" formaction="javascript:void(0)"
                    class="relative -ml-px inline-flex items-center rounded-r-md bg-brand-800 px-3 py-2 text-xs font-medium text-white inset-ring-1 inset-ring-brand-700 hover:bg-brand-700 focus:z-10"
                    hx-post="/api/v1/emails/bulk"
                    hx-target="#email-detail-pane"
                    hx-swap="innerHTML"
                    hx-include="#bulk-email-ids, #bulk-mailbox-id"
                    hx-vals='{"action": "unread"}'>
                Mark unread
            </button>
        </span>

        <span class="isolate inline-flex rounded-md shadow-xs ml-2">
            <button type="submit" formaction="javascript:void(0)"
                    class="relative inline-flex items-center rounded-md bg-brand-800 px-3 py-2 text-xs font-medium text-white inset-ring-1 inset-ring-brand-700 hover:bg-brand-700 focus:z-10"
                    hx-post="/api/v1/emails/bulk"
                    hx-target="#email-detail-pane"
                    hx-swap="innerHTML"
                    hx-include="#bulk-email-ids, #bulk-mailbox-id"
                    hx-vals='{"action": "flag"}'>
                Star
            </button>
        </span>
    </form>
</div>
