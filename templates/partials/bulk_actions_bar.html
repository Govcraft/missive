<div id="bulk-actions-bar" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 z-40 flex items-center gap-2 rounded-lg bg-gray-900 px-4 py-3 shadow-xl">
    <span id="bulk-count" class="text-sm text-white mr-2">0 selected</span>
    <form class="inline-flex gap-1">
        <input type="hidden" name="mailbox_id" id="bulk-mailbox-id" value="" />
        <input type="hidden" name="email_ids" id="bulk-email-ids" value="" />

        <button type="submit" formaction="javascript:void(0)"
                class="rounded-md bg-gray-700 px-3 py-1.5 text-xs font-medium text-white hover:bg-gray-600"
                hx-post="/api/v1/emails/bulk"
                hx-target="#email-detail-pane"
                hx-swap="innerHTML"
                hx-include="#bulk-email-ids, #bulk-mailbox-id"
                hx-vals='{"action": "delete"}'
                hx-confirm="Delete selected emails?">
            Delete
        </button>
        <button type="submit" formaction="javascript:void(0)"
                class="rounded-md bg-gray-700 px-3 py-1.5 text-xs font-medium text-white hover:bg-gray-600"
                hx-post="/api/v1/emails/bulk"
                hx-target="#email-detail-pane"
                hx-swap="innerHTML"
                hx-include="#bulk-email-ids, #bulk-mailbox-id"
                hx-vals='{"action": "archive"}'>
            Archive
        </button>
        <button type="submit" formaction="javascript:void(0)"
                class="rounded-md bg-gray-700 px-3 py-1.5 text-xs font-medium text-white hover:bg-gray-600"
                hx-post="/api/v1/emails/bulk"
                hx-target="#email-detail-pane"
                hx-swap="innerHTML"
                hx-include="#bulk-email-ids, #bulk-mailbox-id"
                hx-vals='{"action": "spam"}'>
            Spam
        </button>
        <button type="submit" formaction="javascript:void(0)"
                class="rounded-md bg-gray-700 px-3 py-1.5 text-xs font-medium text-white hover:bg-gray-600"
                hx-post="/api/v1/emails/bulk"
                hx-target="#email-detail-pane"
                hx-swap="innerHTML"
                hx-include="#bulk-email-ids, #bulk-mailbox-id"
                hx-vals='{"action": "read"}'>
            Mark read
        </button>
        <button type="submit" formaction="javascript:void(0)"
                class="rounded-md bg-gray-700 px-3 py-1.5 text-xs font-medium text-white hover:bg-gray-600"
                hx-post="/api/v1/emails/bulk"
                hx-target="#email-detail-pane"
                hx-swap="innerHTML"
                hx-include="#bulk-email-ids, #bulk-mailbox-id"
                hx-vals='{"action": "unread"}'>
            Mark unread
        </button>
        <button type="submit" formaction="javascript:void(0)"
                class="rounded-md bg-gray-700 px-3 py-1.5 text-xs font-medium text-white hover:bg-gray-600"
                hx-post="/api/v1/emails/bulk"
                hx-target="#email-detail-pane"
                hx-swap="innerHTML"
                hx-include="#bulk-email-ids, #bulk-mailbox-id"
                hx-vals='{"action": "flag"}'>
            Star
        </button>
    </form>
</div>
