<div class="flex items-center gap-2 rounded-md bg-gray-50 px-3 py-2 text-sm">
    <svg class="size-4 shrink-0 text-gray-400" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M18.375 12.739l-7.693 7.693a4.5 4.5 0 01-6.364-6.364l10.94-10.94A3 3 0 1119.5 7.372L8.552 18.32m.009-.01l-.01.01m5.699-9.941l-7.81 7.81a1.5 1.5 0 002.112 2.13" />
    </svg>
    <span class="truncate">{{ name }}</span>
    <span class="text-xs text-gray-400">{{ size_display }}</span>
    <input type="hidden" name="attachment_blob_ids" value="{{ blob_id }}" />
    <input type="hidden" name="attachment_names" value="{{ name }}" />
    <input type="hidden" name="attachment_types" value="{{ content_type }}" />
    <button type="button" onclick="this.closest('div').remove()" class="ml-auto text-gray-400 hover:text-gray-600">
        <svg class="size-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
    </button>
</div>
