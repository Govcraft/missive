<form hx-post="/api/v1/emails/{{ email_id }}/toggle-flag"
      hx-target="this"
      hx-swap="outerHTML"
      class="inline-flex">
    {% if is_flagged %}
    <input type="hidden" name="flagged" value="false" />
    <button type="submit" title="Remove star"
            class="relative inline-flex items-center rounded-md bg-white px-4 py-2 text-accent-600 shadow-xs inset-ring-1 inset-ring-brand-300 hover:bg-brand-50 focus:z-10">
        <span class="sr-only">Remove star</span>
        <svg class="size-5" fill="currentColor" viewBox="0 0 24 24">
            <path d="M10.788 3.21c.448-1.077 1.976-1.077 2.424 0l2.082 5.006 5.404.434c1.164.093 1.636 1.545.749 2.305l-4.117 3.527 1.257 5.273c.271 1.136-.964 2.033-1.96 1.425L12 18.354 7.373 21.18c-.996.608-2.231-.29-1.96-1.425l1.257-5.273-4.117-3.527c-.887-.76-.415-2.212.749-2.305l5.404-.434 2.082-5.005Z" />
        </svg>
    </button>
    {% else %}
    <input type="hidden" name="flagged" value="true" />
    <button type="submit" title="Star"
            class="relative inline-flex items-center rounded-md bg-white px-4 py-2 text-brand-700 shadow-xs inset-ring-1 inset-ring-brand-300 hover:bg-brand-50 focus:z-10">
        <span class="sr-only">Star</span>
        <svg class="size-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M11.48 3.499a.562.562 0 0 1 1.04 0l2.125 5.111a.563.563 0 0 0 .475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 0 0-.182.557l1.285 5.385a.562.562 0 0 1-.84.61l-4.725-2.885a.562.562 0 0 0-.586 0L6.982 20.54a.562.562 0 0 1-.84-.61l1.285-5.386a.562.562 0 0 0-.182-.557l-4.204-3.602a.562.562 0 0 1 .321-.988l5.518-.442a.563.563 0 0 0 .475-.345L11.48 3.5Z" />
        </svg>
    </button>
    {% endif %}
</form>
