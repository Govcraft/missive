<div class="bg-surface rounded-lg shadow-xs p-4">
    <!-- Month navigation header -->
    <div class="flex items-center justify-between mb-4">
        <button type="button"
                hx-get="/api/v1/calendar/month?year={{ month.prev_year }}&month={{ month.prev_month }}"
                hx-target="#calendar-mini"
                hx-swap="innerHTML"
                class="p-1 rounded-md text-on-surface-muted hover:bg-surface-hover hover:text-on-surface transition-colors">
            <span class="sr-only">Previous month</span>
            <svg class="size-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
            </svg>
        </button>
        <h2 class="text-sm font-semibold text-on-surface">{{ month.month_name }}</h2>
        <button type="button"
                hx-get="/api/v1/calendar/month?year={{ month.next_year }}&month={{ month.next_month }}"
                hx-target="#calendar-mini"
                hx-swap="innerHTML"
                class="p-1 rounded-md text-on-surface-muted hover:bg-surface-hover hover:text-on-surface transition-colors">
            <span class="sr-only">Next month</span>
            <svg class="size-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
            </svg>
        </button>
    </div>

    <!-- Day name headers -->
    <div class="grid grid-cols-7 text-center text-xs font-medium text-on-surface-muted mb-1">
        {% for name in DAY_NAMES %}
        <div class="py-1">{{ name }}</div>
        {% endfor %}
    </div>

    <!-- Day grid (6 rows x 7 cols = 42 cells) -->
    <div class="grid grid-cols-7 text-center text-sm">
        {% for day in month.days %}
        <div class="py-0.5">
            <button type="button"
                    hx-get="/api/v1/calendar/events?date={{ day.date.format("%Y-%m-%d") }}"
                    hx-target="#event-directory"
                    hx-swap="innerHTML"
                    class="relative mx-auto flex size-8 items-center justify-center rounded-full transition-colors
                        {% if day.is_selected %}bg-surface-invert text-on-surface-invert font-semibold
                        {% else %}{% if day.is_today %}bg-accent text-on-surface-invert font-semibold
                        {% else %}{% if day.is_current_month %}text-on-surface hover:bg-surface-hover
                        {% else %}text-on-surface-faint hover:bg-surface-hover
                        {% endif %}{% endif %}{% endif %}">
                {{ day.day }}
                {% if day.has_events %}
                <span class="absolute bottom-0.5 left-1/2 -translate-x-1/2 size-1 rounded-full
                    {% if day.is_selected || day.is_today %}bg-on-surface-invert{% else %}bg-accent{% endif %}"></span>
                {% endif %}
            </button>
        </div>
        {% endfor %}
    </div>
</div>
