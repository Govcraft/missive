{% extends "base.html" %}

{% block title %}Contacts - Postal{% endblock %}

{% block content %}
<div class="flex h-screen">
    {% include "partials/app_nav.html" %}
    <div class="flex-1 flex flex-col min-w-0">
        <div class="h-12 bg-white border-b border-gray-200 flex items-center justify-between px-4 shrink-0">
            <h1 class="text-lg font-semibold text-gray-800">Contacts</h1>
            <div class="flex items-center gap-4">
                <span class="text-sm text-gray-500">{{ username }}</span>
                <form action="/logout" method="POST" class="inline">
                    <button type="submit" class="text-sm text-gray-500 hover:text-gray-700">Sign out</button>
                </form>
            </div>
        </div>
        <div class="flex-1 flex items-center justify-center text-gray-400">
            Contacts — coming soon
        </div>
    </div>
</div>
{% endblock %}
